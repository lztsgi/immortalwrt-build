name: Build ImmortalWrt-24.10 for armsr_armv8

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: true
        default: 'false'
        type: choice
        options:
          - true
          - false
  schedule:
    - cron: "0 0 10,26 * *" # 每月 10 号、26 号自动构建

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Free up space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Initialize environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update > /dev/null
        # 安装自定义依赖列表
        sudo -E apt-get -qq install -y $(curl -fsSL https://raw.githubusercontent.com/nantayo/My-Pkg/master/openwrt) > /dev/null
        sudo -E apt-get -qq autoremove --purge > /dev/null
        sudo -E apt-get -qq clean > /dev/null
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        git clone $REPO_URL -b $REPO_BRANCH --single-branch --depth=1 openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        echo "FILE_DATE=$(date +"%Y%m%d")" >> $GITHUB_ENV

    - name: Update & Install feeds
      run: |
        chmod +x armsr/armv8/diy/diy.sh
        cd openwrt
        ./scripts/feeds update -a
        $GITHUB_WORKSPACE/armsr/armv8/diy/diy.sh
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load N1 custom config
      run: |
        rm -rf openwrt/files openwrt/.config
        mv armsr/armv8/N1/files armsr/armv8/N1/.config openwrt/

        # 动态生成开机静音脚本，调低 Cron 日志级别
        mkdir -p openwrt/files/etc/uci-defaults
        cat << 'EOF' > openwrt/files/etc/uci-defaults/99-mute-cron
        #!/bin/sh
        # 将 Cron 日志级别设为 9 (Error)，屏蔽常规 started 提示
        uci set system.@system[0].cronloglevel='9'
        uci commit system
        /etc/init.d/cron restart
        exit 0
        EOF
        chmod +x openwrt/files/etc/uci-defaults/99-mute-cron

    - name: SSH connect to Actions
      uses: P3TERX/ssh2actions@main
      if: github.event.inputs.ssh == 'true'

    - name: Download package
      working-directory: ./openwrt
      run: |
        make defconfig
        make download -j$(( $(nproc) * 2 ))
        find dl -size -1k -exec rm -f {} \;

    - name: Compile N1 firmware
      run: |
        chmod -R 755 openwrt
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(( $(nproc) + 1 )) || make -j1 V=s

    - name: Package N1 firmware
      uses: unifreq/openwrt_packit@master
      env:
        # 这里传入 armsr/armv8 产出的 rootfs 包
        # openwrt_packit 脚本兼容使用 OPENWRT_ARMVIRT 这个旧变量名
        OPENWRT_ARMVIRT: openwrt/bin/targets/armsr/armv8/*rootfs.tar.gz

        # ophub/kernel 后，普通盒子会走 flippy 内核下载链路
        # breakingbadboy/OpenWrt 是 stable 分支
        KERNEL_REPO_URL: ophub/kernel

        # 指定 6.18.y 这个内核大系列：https://github.com/unifreq/openwrt_packit/blob/master/openwrt_flippy.sh
        KERNEL_VERSION_NAME: 6.18.y

        # 自动获取 6.18.y 同系列中的最新补丁版
        # 例如 6.18.x 中最新可用版本
        KERNEL_AUTO_LATEST: true

        # 这里保持 diy，不要乱改
        # 因为下面是通过自定义脚本 mk_s905d_n1.sh 来打 N1 包
        PACKAGE_SOC: diy

        # 输出镜像压缩格式保持 xz
        GZIP_IMGS: .gz

        # 自定义 N1 打包脚本
        SCRIPT_DIY_PATH: armsr/armv8/N1/mk_s905d_n1.sh

        # 固件作者标识
        WHOAMI: LZT

        # 保持原有流量转发设置，不动
        SW_FLOWOFFLOAD: 0
        SFE_FLOW: 0

    - name: Upload firmware to release
      uses: softprops/action-gh-release@master
      with:
        tag_name: OpenWrt_${{ env.FILE_DATE }}
        files: ${{ env.PACKAGED_OUTPUTPATH }}/*.img.*
        body: |
          首次使用建议全新刷写
          * 基本信息
            IP路径修改：armsr/armv8/N1/files/etc/config/network
              IP: 192.168.101.2
            账户: root
            密码: password

    - name: Delete old releases
      uses: dev-drprasad/delete-older-releases@master
      with:
        keep_latest: 2
        delete_tags: true

    # ================= 修改区：失败救援机制 =================
    - name: SSH connect to Actions on failure
      uses: P3TERX/ssh2actions@main
      if: failure()
